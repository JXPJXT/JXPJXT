<svg width="100%" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0b2a5a"/>
      <stop offset="100%" style="stop-color:#00cfff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#00cfff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#00cfff" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="220" x2="900" y2="220" stroke="#00cfff" stroke-width="0.3" opacity="0.2"/>
  <line x1="150" y1="0" x2="150" y2="280" stroke="#00cfff" stroke-width="0.3" opacity="0.1"/>
  <line x1="750" y1="0" x2="750" y2="280" stroke="#00cfff" stroke-width="0.3" opacity="0.1"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#00cfff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="60" cy="60" r="25" fill="none" stroke="#00cfff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="840" cy="220" r="40" fill="none" stroke="#00cfff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="840" cy="220" r="25" fill="none" stroke="#00cfff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="840" cy="60" r="20" fill="none" stroke="#7dd3fc" stroke-width="0.5" opacity="0.2"/>
  <circle cx="60" cy="220" r="20" fill="none" stroke="#7dd3fc" stroke-width="0.5" opacity="0.2"/>

  <!-- Glowing dots -->
  <circle cx="200" cy="40" r="2" fill="#00cfff" opacity="0.6"/>
  <circle cx="450" cy="25" r="1.5" fill="#7dd3fc" opacity="0.5"/>
  <circle cx="700" cy="40" r="2" fill="#00cfff" opacity="0.6"/>
  <circle cx="300" cy="250" r="1.5" fill="#7dd3fc" opacity="0.4"/>
  <circle cx="600" cy="255" r="2" fill="#00cfff" opacity="0.5"/>

  <!-- Wave bottom -->
  <path d="M0,240 C150,210 300,260 450,240 C600,220 750,255 900,235 L900,280 L0,280 Z" fill="#0a0a1a" opacity="0.5"/>

  <!-- Name -->
  <text
    x="450"
    y="138"
    font-family="'Segoe UI', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="52"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="4"
  >JAPJOT SINGH BHATIA</text>

  <!-- Divider line -->
  <line x1="270" y1="158" x2="630" y2="158" stroke="#00cfff" stroke-width="1" opacity="0.5"/>
  <circle cx="270" cy="158" r="2" fill="#00cfff" opacity="0.7"/>
  <circle cx="630" cy="158" r="2" fill="#00cfff" opacity="0.7"/>

  <!-- Subtitle -->
  <text
    x="450"
    y="188"
    font-family="'Segoe UI', 'Courier New', 'Arial', sans-serif"
    font-size="14"
    font-weight="400"
    text-anchor="middle"
    fill="#7dd3fc"
    filter="url(#subtleGlow)"
    letter-spacing="3"
  >AI/ML ENGINEER  •  LLM SYSTEMS  •  AGENTIC AI  •  CLOUD SCALE</text>

  <!-- Corner tags -->
  <text x="20" y="275" font-family="'Courier New', monospace" font-size="10" fill="#00cfff" opacity="0.4">&lt;japjot.ai /&gt;</text>
  <text x="780" y="275" font-family="'Courier New', monospace" font-size="10" fill="#00cfff" opacity="0.4">India 🇮🇳</text>
</svg>
